name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build release binaries
        run: cargo build --release --bin resurfacer-core --bin night_mode

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/resurfacer-core.exe
            target/release/night_mode.exe
          body: |
            ## Resurfacer ${{ github.ref_name }}

            ### night_mode.exe — нічний режим дисплея
            Окремий інструмент, не потребує нічого іншого.
            - Запусти `.exe` → іконка в треї
            - **`Ctrl+Alt+N`** — увімк/вимк
            - Warm amber ~3000K через GPU gamma LUT (Magnification API)
            - Повторний запуск `.exe` = toggle (зручно для прив'язки до кнопки)

            ### resurfacer-core.exe — демон керування вкладками
            - Вимагає браузерного розширення для native messaging
            - Архівує "забуті" вкладки у SQLite
            - Нічний режим буде вбудований сюди в майбутньому
